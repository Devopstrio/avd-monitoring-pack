name: 'AVD Monitoring Pack CD'

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'backend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

jobs:
  validate-and-test:
    name: 'Logic & Security Validation'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v3

    - name: Run Pytest
      run: |
        pip install pytest fastapi httpx
        pytest tests/

    - name: IaC Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        directory: './terraform'

  build-and-deploy:
    name: 'Container & Platform Rollout'
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Azure CLI Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build & Push Monitor API
      run: |
        az acr login --name acrmonitor
        docker build -t acrmonitor.azurecr.io/devopstrio/monitor-api:${{ github.sha }} ./backend
        docker push acrmonitor.azurecr.io/devopstrio/monitor-api:${{ github.sha }}

    - name: AKS Set Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: 'rg-avd-monitoring-prd'
        cluster-name: 'aks-avd-monitor-prd'

    - name: Helm Rollout
      run: |
        helm upgrade --install avd-monitor ./helm/avd-monitoring-pack \
        --namespace avd-monitor-prod --create-namespace \
        --set api.image.tag=${{ github.sha }}
